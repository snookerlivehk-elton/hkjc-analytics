[phases.setup]
nixPkgs = ["python311"]
aptPkgs = [
    "libnss3",
    "libatk1.0-0",
    "libatk-bridge2.0-0",
    "libcups2",
    "libdrm2",
    "libxkbcommon0",
    "libxcomposite1",
    "libxdamage1",
    "libxrandr2",
    "libgbm1",
    "libpango-1.0-0",
    "libcairo2",
    "libasound2",
    "libxshmfence1"
]

[variables]
LD_LIBRARY_PATH = "/usr/lib/x86_64-linux-gnu:/usr/local/lib"
PLAYWRIGHT_BROWSERS_PATH = "/app/playwright_browsers"

[phases.build]
cmds = [
    "pip install -r requirements.txt", 
    "python scripts/init_db.py"
]
